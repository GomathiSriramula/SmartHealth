<!DOCTYPE html>
<html>
<head>
    <title>Test CORS</title>
</head>
<body>
    <h1>Testing Backend CORS</h1>
    <button onclick="testRegister()">Test Register API</button>
    <button onclick="testLogin()">Test Login API</button>
    <pre id="output"></pre>

    <script>
        const API_URL = 'http://localhost:8000';
        const output = document.getElementById('output');

        async function testRegister() {
            output.textContent = 'Testing registration...\n';
            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'testcors@example.com',
                        username: 'testcors',
                        password: 'test123'
                    })
                });
                
                const data = await response.json();
                output.textContent += `Status: ${response.status}\n`;
                output.textContent += `Response: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                output.textContent += `Error: ${error.message}`;
            }
        }

        async function testLogin() {
            output.textContent = 'Testing login...\n';
            try {
                const response = await fetch(`${API_URL}/api/auth/login/json`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'testuser',
                        password: 'test123'
                    })
                });
                
                const data = await response.json();
                output.textContent += `Status: ${response.status}\n`;
                output.textContent += `Response: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                output.textContent += `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
