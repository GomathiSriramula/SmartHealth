<!DOCTYPE html>
<html>
<head>
    <title>Alerts Test</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .alert { border: 2px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 4px; }
        .alert.HIGH { border-color: red; background: #ffe6e6; }
        .alert.MEDIUM { border-color: orange; background: #fff0e6; }
        .alert.LOW { border-color: green; background: #e6ffe6; }
        .status { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin: 5px 0; }
        .status.active { background: red; color: white; }
        .status.resolved { background: green; color: white; }
        button { padding: 10px 15px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0052a3; }
        .error { color: red; padding: 10px; background: #ffe6e6; border-radius: 4px; margin: 10px 0; }
        .success { color: green; padding: 10px; background: #e6ffe6; border-radius: 4px; margin: 10px 0; }
        .loading { color: #0066cc; padding: 10px; }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        .modal.show { display: block; }
        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
            border-radius: 8px;
        }
        .close { color: #aaa; float: right; font-size: 28px; cursor: pointer; }
        .close:hover { color: black; }
        h2, h3 { color: #333; margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚨 Water Quality Alerts - Real Data Test</h1>
        <p>This page directly fetches alerts from the backend API</p>
        
        <div>
            <button onclick="fetchAlerts()">🔄 Fetch Alerts from Backend</button>
            <button onclick="setAutoRefresh()">⏱️ Auto-Refresh (10s)</button>
            <button onclick="clearAutoRefresh()">⏸️ Stop Auto-Refresh</button>
        </div>
        
        <div id="status" class="loading" style="margin-top: 20px;">Loading alerts...</div>
        <div id="stats" style="margin: 20px 0; display: none;">
            <strong>Stats:</strong> <span id="stat-total">0</span> total | <span id="stat-active">0</span> active | <span id="stat-resolved">0</span> resolved
        </div>
        
        <div id="alerts-container"></div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Alert Details</h2>
            <div id="modalContent"></div>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;

        async function fetchAlerts() {
            const statusDiv = document.getElementById('status');
            const container = document.getElementById('alerts-container');
            
            statusDiv.className = 'loading';
            statusDiv.textContent = 'Loading alerts...';
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/alerts?status=all&limit=20', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                const alerts = data.alerts || [];

                // Update stats
                document.getElementById('stat-total').textContent = data.total || 0;
                document.getElementById('stat-active').textContent = alerts.filter(a => a.status === 'active').length;
                document.getElementById('stat-resolved').textContent = alerts.filter(a => a.status === 'resolved').length;
                document.getElementById('stats').style.display = 'block';

                if (alerts.length === 0) {
                    statusDiv.className = 'success';
                    statusDiv.textContent = '✅ No alerts. Water quality is normal.';
                    container.innerHTML = '<p style="text-align: center; color: #666;">No alerts to display</p>';
                } else {
                    statusDiv.className = 'success';
                    statusDiv.textContent = `✅ Successfully loaded ${alerts.length} alerts`;
                    
                    container.innerHTML = alerts.map(alert => `
                        <div class="alert ${alert.riskLevel}">
                            <h3>${alert.location}</h3>
                            <div class="status ${alert.status}">${alert.status.toUpperCase()}</div>
                            <p><strong>Risk Level:</strong> ${alert.riskLevel}</p>
                            <p><strong>Reason:</strong> ${alert.reason || 'N/A'}</p>
                            <p><strong>Created:</strong> ${new Date(alert.createdAt).toLocaleString()}</p>
                            <p><strong>Notification Sent:</strong> ${alert.notificationSent ? '✅ Yes' : '❌ No'}</p>
                            <button onclick="showDetails('${alert._id}')">📋 View Full Details</button>
                            ${alert.status === 'active' ? `<button onclick="resolveAlert('${alert._id}')">✅ Resolve</button>` : ''}
                            ${!alert.notificationSent ? `<button onclick="resendNotification('${alert._id}')">📧 Send Alert</button>` : ''}
                        </div>
                    `).join('');
                }
            } catch (error) {
                statusDiv.className = 'error';
                statusDiv.textContent = `❌ Error: ${error.message}`;
                console.error('Fetch error:', error);
            }
        }

        async function showDetails(alertId) {
            try {
                const response = await fetch(`http://127.0.0.1:5000/api/alerts/${alertId}`);
                if (!response.ok) throw new Error('Failed to fetch alert details');
                
                const data = await response.json();
                const alert = data.alert;
                
                const modal = document.getElementById('detailModal');
                const content = document.getElementById('modalContent');
                
                content.innerHTML = `
                    <p><strong>Location:</strong> ${alert.location}</p>
                    <p><strong>Status:</strong> <span class="status ${alert.status}">${alert.status.toUpperCase()}</span></p>
                    <p><strong>Risk Level:</strong> ${alert.riskLevel}</p>
                    <p><strong>Reason:</strong> ${alert.reason}</p>
                    <p><strong>Created:</strong> ${new Date(alert.createdAt).toLocaleString()}</p>
                    <p><strong>Notification Sent:</strong> ${alert.notificationSent ? '✅ Yes' : '❌ No'}</p>
                    ${alert.notificationError ? `<p><strong style="color:red;">Error:</strong> ${alert.notificationError}</p>` : ''}
                    <p><strong>Alert ID:</strong> <code>${alert._id}</code></p>
                `;
                
                modal.classList.add('show');
            } catch (error) {
                alert('Error loading alert details: ' + error.message);
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        async function resolveAlert(alertId) {
            try {
                const response = await fetch(`http://127.0.0.1:5000/api/alerts/${alertId}/resolve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason: 'Manually resolved' })
                });
                
                if (!response.ok) throw new Error('Failed to resolve alert');
                
                alert('Alert resolved successfully!');
                fetchAlerts();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function resendNotification(alertId) {
            try {
                const response = await fetch(`http://127.0.0.1:5000/api/alerts/${alertId}/notify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                
                if (!response.ok) throw new Error('Failed to send notification');
                
                alert('Alert notification sent!');
                fetchAlerts();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function setAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(fetchAlerts, 10000);
            console.log('Auto-refresh enabled (10 seconds)');
        }

        function clearAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
            console.log('Auto-refresh disabled');
        }

        // Initial load
        fetchAlerts();
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                modal.classList.remove('show');
            }
        }
    </script>
</body>
</html>
